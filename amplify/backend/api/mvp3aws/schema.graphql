type ElectricityRecord
  @model
  @auth(rules: [{ allow: owner }]) {
  id: ID!
  year: Int!
  month: String!
  kwh: Float!
  emissionsT: Float!
  provider: String
  createdAt: AWSDateTime
  receiptKey: String
  receiptUploadedAt: AWSDateTime
}

type WaterRecord
  @model
  @auth(rules: [{ allow: owner }]) {
  id: ID!
  year: Int!
  month: String!
  volume: Float!
  provider: String
  createdAt: AWSDateTime
  receiptKey: String
  receiptUploadedAt: AWSDateTime
}
